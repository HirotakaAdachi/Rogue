<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Minimal Rogue</title>
    <style>
:root { --bg-color: #0a0a0a; --border-color: #333333; }
body { margin: 0; padding: 0; background-color: var(--bg-color); display: flex; justify-content: center; align-items: center; height: 100vh; height: 100svh; overflow: hidden; user-select: none; -webkit-user-select: none; cursor: default; }
.game-wrapper { display: flex; flex-direction: column; border: 1px solid var(--border-color); padding: 20px; transform-origin: center center; }
#game-canvas { border: 1px solid var(--border-color); background-color: #000; cursor: default; display: block; }
    </style>
</head>

<body>
    <div class="game-wrapper">
        <canvas id="game-canvas"></canvas>
    </div>
    <script src="script.js?v=692"></script>
    <script>
(function(){
    function fit(){
        var pad = 42;
        var s = Math.min(1, window.innerWidth / (CANVAS_W + pad), window.innerHeight / (CANVAS_H_FULL + pad));
        document.querySelector('.game-wrapper').style.zoom = s;
    }
    fit();
    window.addEventListener('resize', fit);
    window.addEventListener('orientationchange', function(){ setTimeout(fit, 150); });
})();
    </script>
</body>

</html>
