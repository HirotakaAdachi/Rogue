<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Minimal Rogue</title>
    <style>
:root { --bg-color: #0a0a0a; --border-color: #333333; }
body { margin: 0; padding: 0; background-color: var(--bg-color); overflow: hidden; user-select: none; -webkit-user-select: none; cursor: default; }
.game-wrapper { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }
#game-canvas { border: 1px solid var(--border-color); background-color: #000; cursor: default; display: block; }
    </style>
</head>

<body>
    <div class="game-wrapper">
        <canvas id="game-canvas"></canvas>
    </div>
    <script src="script.js?v=706"></script>
    <script>
(function(){
    // タッチデバイス（スマホ）のみカスタムfit()を適用。
    // PCはscript.js内のinitScale()がそのまま機能する。
    var isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
    if (!isMobile) return;

    // initScale() の transform と resize リスナーを無効化（モバイルのみ）
    if (typeof window._applyGameScale === 'function') {
        window.removeEventListener('resize', window._applyGameScale);
    }
    var gw = document.querySelector('.game-wrapper');
    if (gw) { gw.style.transform = 'none'; gw.style.transformOrigin = ''; }
    document.body.style.paddingTop = '';
    document.body.style.alignItems = '';

    var c = document.getElementById('game-canvas');

    function fit(){
        var vw = window.innerWidth;
        var vh = window.innerHeight;
        var portrait = vh > vw;

        // 縦持ちのときDパッド分の高さを計測してその上にキャンバスを収める
        var dpadH = 0;
        if (portrait) {
            var tc = document.getElementById('tc-wrap');
            if (tc) {
                var r = tc.getBoundingClientRect();
                dpadH = r.height > 0 ? (vh - r.top) : 220;
            } else {
                dpadH = 220;
            }
        }

        var availH = dpadH > 0 ? (vh - dpadH) : vh;
        var s = Math.min(1, vw / CANVAS_W, availH / CANVAS_H_FULL);
        var cw = Math.floor(CANVAS_W * s);
        var ch = Math.floor(CANVAS_H_FULL * s);
        c.style.width  = cw + 'px';
        c.style.height = ch + 'px';

        // Dパッドの上端とスクリーン上端の中間にキャンバスを配置
        if (gw) gw.style.paddingBottom = dpadH > 0 ? dpadH + 'px' : '';

        // _initTouchControls が追加する canvas-viewport にも同じサイズを適用
        var vp = document.getElementById('canvas-viewport');
        if (vp) { vp.style.width = cw + 'px'; vp.style.height = ch + 'px'; }
    }

    fit();
    requestAnimationFrame(fit); // 初回レイアウト後に再測定

    window.addEventListener('resize', fit);
    window.addEventListener('orientationchange', function(){ setTimeout(fit, 300); });
})();
    </script>
</body>

</html>
