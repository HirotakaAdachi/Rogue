<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Minimal Rogue</title>
    <style>
:root { --bg-color: #0a0a0a; --border-color: #333333; }
body { margin: 0; padding: 0; background-color: var(--bg-color); display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; min-height: 100svh; overflow: hidden; user-select: none; -webkit-user-select: none; cursor: default; }
.game-wrapper { display: flex; flex-direction: column; border: 1px solid var(--border-color); padding: 20px; transform-origin: top center; }
#game-canvas { border: 1px solid var(--border-color); background-color: #000; cursor: default; display: block; }
    </style>
</head>

<body>
    <div class="game-wrapper">
        <canvas id="game-canvas"></canvas>
    </div>
    <script src="script.js?v=693"></script>
    <script>
(function(){
    function fit(){
        var pad = 42;
        var totalW = CANVAS_W + pad;
        var totalH = CANVAS_H_FULL + pad;
        var s = Math.min(1, window.innerWidth / totalW, window.innerHeight / totalH);
        var scaledH = totalH * s;
        var marginTop = Math.max(0, (window.innerHeight - scaledH) / 2);
        var w = document.querySelector('.game-wrapper');
        w.style.zoom = s;
        w.style.marginTop = marginTop + 'px';
    }
    fit();
    window.addEventListener('resize', fit);
    window.addEventListener('orientationchange', function(){ setTimeout(fit, 150); });
})();
    </script>
</body>

</html>
