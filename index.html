<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Minimal Rogue</title>
    <style>
:root { --bg-color: #0a0a0a; --border-color: #333333; }
body { margin: 0; padding: 0; background-color: var(--bg-color); overflow: hidden; user-select: none; -webkit-user-select: none; cursor: default; }
.game-wrapper { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }
#game-canvas { border: 1px solid var(--border-color); background-color: #000; cursor: default; display: block; }
    </style>
</head>

<body>
    <div class="game-wrapper">
        <canvas id="game-canvas"></canvas>
    </div>
    <script src="script.js?v=695"></script>
    <script>
(function(){
    // initScale() in script.js applies transform:scale to .game-wrapper which conflicts
    // with our CSS-size approach — disable it.
    if (typeof window._applyGameScale === 'function') {
        window.removeEventListener('resize', window._applyGameScale);
    }
    var wrapper = document.querySelector('.game-wrapper');
    if (wrapper) { wrapper.style.transform = 'none'; wrapper.style.transformOrigin = ''; }
    document.body.style.paddingTop = '';
    document.body.style.alignItems = '';

    var c = document.getElementById('game-canvas');
    function fit(){
        var vw = window.innerWidth;
        var vh = window.innerHeight;
        var s = Math.min(1, vw / CANVAS_W, vh / CANVAS_H_FULL);
        var cw = Math.floor(CANVAS_W      * s);
        var ch = Math.floor(CANVAS_H_FULL * s);
        c.style.width  = cw + 'px';
        c.style.height = ch + 'px';
        // Also resize canvas-viewport wrapper added by _initTouchControls on mobile
        var vp = document.getElementById('canvas-viewport');
        if (vp) { vp.style.width = cw + 'px'; vp.style.height = ch + 'px'; }
    }
    fit();
    window.addEventListener('resize', fit);
    window.addEventListener('orientationchange', function(){ setTimeout(fit, 150); });
})();
    </script>
</body>

</html>
