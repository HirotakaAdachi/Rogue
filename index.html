<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Minimal Rogue</title>
    <style>
:root { --bg-color: #0a0a0a; --border-color: #333333; }
body { margin: 0; padding: 0; background-color: var(--bg-color); display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; user-select: none; -webkit-user-select: none; cursor: default; }
.game-wrapper { display: flex; flex-direction: column; border: 1px solid var(--border-color); padding: 20px; }
#game-canvas { border: 1px solid var(--border-color); background-color: #000; cursor: default; display: block; }
    </style>
</head>

<body>
    <div class="game-wrapper">
        <canvas id="game-canvas"></canvas>
    </div>
    <script src="script.js?v=630"></script>
</body>

</html>
